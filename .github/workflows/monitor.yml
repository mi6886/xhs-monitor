name: XHS Monitor

on:
  schedule:
    # 北京时间 07:00, 14:00, 20:00 (UTC = 北京时间 - 8)
    - cron: '0 23 * * *'  # 北京 07:00
    - cron: '0 6 * * *'   # 北京 14:00
    - cron: '0 12 * * *'  # 北京 20:00
  workflow_dispatch:
    inputs:
      run_period:
        description: 'Telegram header period'
        required: false
        default: Auto
        type: choice
        options:
          - Auto
          - Morning
          - Afternoon
          - Evening

permissions:
  contents: write

concurrency:
  group: xhs-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TZ: Asia/Shanghai

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Init database and import targets
        run: |
          python scripts/init_db.py
          python scripts/import_targets.py
        env:
          TIKHUB_API_KEY: ${{ secrets.TIKHUB_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Run monitor (discover + recheck + push)
        run: python -m src.runner all
        env:
          TIKHUB_API_KEY: ${{ secrets.TIKHUB_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          XHS_RUN_PERIOD: ${{ github.event_name == 'workflow_dispatch' && inputs.run_period || (github.event.schedule == '0 23 * * *' && 'Morning' || github.event.schedule == '0 6 * * *' && 'Afternoon' || github.event.schedule == '0 12 * * *' && 'Evening' || '') }}

      # 把数据库 commit 回 repo，下一轮就能读到
      - name: Commit database
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/monitor.db
          git diff --staged --quiet || git commit -m "data: update monitor.db [skip ci]"
          git push
