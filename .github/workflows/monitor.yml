name: XHS Monitor

on:
  schedule:
    # 北京时间 8:00, 11:00, 15:00, 17:00 (UTC = 北京时间 - 8)
    - cron: '0 0 * * *'   # 北京 8:00
    - cron: '0 3 * * *'   # 北京 11:00
    - cron: '0 7 * * *'   # 北京 15:00
    - cron: '0 9 * * *'   # 北京 17:00
  workflow_dispatch:        # 支持手动触发

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Init database and import targets
        run: |
          python scripts/init_db.py
          python scripts/import_targets.py
        env:
          TIKHUB_API_KEY: ${{ secrets.TIKHUB_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Run monitor (discover + recheck + push)
        run: python -m src.runner all
        env:
          TIKHUB_API_KEY: ${{ secrets.TIKHUB_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      # 把数据库 commit 回 repo，下一轮就能读到
      - name: Commit database
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/monitor.db
          git diff --staged --quiet || git commit -m "data: update monitor.db [skip ci]"
          git push
