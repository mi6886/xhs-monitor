name: XHS Monitor

on:
  schedule:
    # 北京时间 07:07, 14:07, 20:07 (UTC = 北京时间 - 8)
    # 避开 GitHub Actions 整点高负载，降低 schedule 被延迟或丢弃的概率。
    - cron: '7 23 * * *'  # 北京 07:07
    - cron: '7 6 * * *'   # 北京 14:07
    - cron: '7 12 * * *'  # 北京 20:07
  workflow_dispatch:
    inputs:
      run_period:
        description: 'Telegram header period'
        required: false
        default: Auto
        type: choice
        options:
          - Auto
          - Morning
          - Afternoon
          - Evening
      replay_latest:
        description: 'Only resend the latest exported digest for run_period'
        required: false
        default: false
        type: boolean
      llm_smoke_test:
        description: 'Only test the configured LLM filter without crawling or pushing'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: xhs-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TZ: Asia/Shanghai

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Replay latest exported digest
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.replay_latest && !inputs.llm_smoke_test }}
        run: python -m src.replay_latest --period "$XHS_RUN_PERIOD"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          XHS_RUN_PERIOD: ${{ inputs.run_period == 'Auto' && 'Morning' || inputs.run_period }}

      - name: Run LLM smoke test
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.llm_smoke_test }}
        run: python -m src.llm_smoke_test
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

      - name: Init database and import targets
        if: ${{ !(github.event_name == 'workflow_dispatch' && (inputs.replay_latest || inputs.llm_smoke_test)) }}
        run: |
          python scripts/init_db.py
          python scripts/import_targets.py
        env:
          TIKHUB_API_KEY: ${{ secrets.TIKHUB_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Run monitor (discover + recheck + push)
        if: ${{ !(github.event_name == 'workflow_dispatch' && (inputs.replay_latest || inputs.llm_smoke_test)) }}
        run: python -m src.runner all
        env:
          TIKHUB_API_KEY: ${{ secrets.TIKHUB_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          XHS_RUN_PERIOD: ${{ github.event_name == 'workflow_dispatch' && inputs.run_period || (github.event.schedule == '7 23 * * *' && 'Morning' || github.event.schedule == '7 6 * * *' && 'Afternoon' || github.event.schedule == '7 12 * * *' && 'Evening' || '') }}

      # 把数据库和静态网页数据 commit 回 repo，下一轮和 GitHub Pages 都能读到
      - name: Commit database and site data
        if: ${{ always() && !(github.event_name == 'workflow_dispatch' && (inputs.replay_latest || inputs.llm_smoke_test)) }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/monitor.db
          git add site/data/ 2>/dev/null || true
          git diff --staged --quiet || git commit -m "data: update monitor data"
          git push

      - name: Configure Pages
        if: ${{ always() && !(github.event_name == 'workflow_dispatch' && (inputs.replay_latest || inputs.llm_smoke_test)) }}
        uses: actions/configure-pages@v5

      - name: Upload site
        if: ${{ always() && !(github.event_name == 'workflow_dispatch' && (inputs.replay_latest || inputs.llm_smoke_test)) }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy site
        if: ${{ always() && !(github.event_name == 'workflow_dispatch' && (inputs.replay_latest || inputs.llm_smoke_test)) }}
        uses: actions/deploy-pages@v4
