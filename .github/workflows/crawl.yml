name: Crawl XHS

on:
  # Kept for manual Render-triggered runs only. The scheduled job lives in monitor.yml.
  workflow_dispatch:

jobs:
  trigger-crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Trigger crawl
        run: |
          response=$(curl -s -w "\n%{http_code}" -X POST \
            "${{ secrets.RENDER_URL }}/api/crawl?async=1" \
            -H "Authorization: Bearer ${{ secrets.CRAWL_SECRET }}" \
            -H "Content-Type: application/json")

          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | head -n -1)

          echo "HTTP Status: $http_code"
          echo "Response: $body"

          if [ "$http_code" -ne 200 ]; then
            echo "Crawl trigger failed with HTTP $http_code"
            exit 1
          fi

      - name: Wait for crawl to complete
        run: sleep 180

      - name: Send notifications
        run: |
          response=$(curl -s -w "\n%{http_code}" -X POST \
            "${{ secrets.RENDER_URL }}/api/notify" \
            -H "Authorization: Bearer ${{ secrets.CRAWL_SECRET }}" \
            -H "Content-Type: application/json")

          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | head -n -1)

          echo "HTTP Status: $http_code"
          echo "Response: $body"
